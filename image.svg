<svg xmlns="http://w3.org" viewBox="0 0 1000 750" width="100%" height="100%">
  <defs>
    <style>
      .title { font-family: sans-serif; font-size: 20px; font-weight: bold; fill: #c00000; }
      .section-title { font-family: sans-serif; font-size: 14px; font-weight: bold; fill: #555; text-anchor: middle; }
      .mod-title { font-family: sans-serif; font-size: 12px; font-weight: bold; fill: #111; }
      .mod-text { font-family: sans-serif; font-size: 11px; fill: #555; }
      .arrow { stroke: #444; stroke-width: 1.5; fill: none; }
      .dash-arrow { stroke: #ed7d31; stroke-width: 1.5; stroke-dasharray: 4; fill: none; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#444"/>
    </marker>
    <marker id="dash-arrow-head" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#ed7d31"/>
    </marker>
  </defs>

  <!-- Cabeçalho -->
  <text x="50" y="40" class="title">PUSH_SWAP — FLUXO MODULAR DO PROJETO</text>
  <text x="50" y="60" font-family="sans-serif" font-size: 12px; fill="#666;">Visão macro do fluxo do sistema e módulos de apoio</text>

  <!-- Área Central: Núcleo do Sistema -->
  <rect x="30" y="90" width="940" height="240" rx="8" fill="#f8f9fa" stroke="#0070c0" stroke-width="2"/>
  <text x="500" y="115" class="section-title" fill="#0070c0">NÚCLEO DO SISTEMA</text>

  <!-- Módulos Sequenciais (1 a 4) -->
  <!-- Mód 1 -->
  <rect x="50" y="140" width="130" height="120" rx="4" fill="#fff" stroke="#ccc"/>
  <circle cx="115" cy="160" r="10" fill="#0070c0"/><text x="111" y="164" font-family="sans-serif" font-size: 11px; fill="#fff" font-weight="bold">1</text>
  <text x="115" y="185" class="mod-title" text-anchor="middle">Entrada de Dados</text>
  <text x="60" y="210" class="mod-text">Recebe argumentos</text>
  <text x="60" y="225" class="mod-text">via linha de comando</text>

  <path d="M 180 200 L 210 200" class="arrow" marker-end="url(#arrow)"/>

  <!-- Mód 2 -->
  <rect x="210" y="140" width="130" height="120" rx="4" fill="#fff" stroke="#ccc"/>
  <circle cx="275" cy="160" r="10" fill="#0070c0"/><text x="271" y="164" font-family="sans-serif" font-size: 11px; fill="#fff" font-weight="bold">2</text>
  <text x="275" y="185" class="mod-title" text-anchor="middle">Validação</text>
  <text x="220" y="210" class="mod-text">• Verifica duplicatas</text>
  <text x="220" y="225" class="mod-text">• Verifica limites int</text>

  <path d="M 340 200 L 370 200" class="arrow" marker-end="url(#arrow)"/>

  <!-- Mód 3 -->
  <rect x="370" y="140" width="130" height="120" rx="4" fill="#fff" stroke="#ccc"/>
  <circle cx="435" cy="160" r="10" fill="#0070c0"/><text x="431" y="164" font-family="sans-serif" font-size: 11px; fill="#fff" font-weight="bold">3</text>
  <text x="435" y="185" class="mod-title" text-anchor="middle">Estruturas</text>
  <text x="380" y="210" class="mod-text">Cria pilhas A e B</text>
  <text x="380" y="225" class="mod-text">com dados limpos</text>

  <path d="M 500 200 L 530 200" class="arrow" marker-end="url(#arrow)"/>

  <!-- Mód 5 (Disorder) -->
  <rect x="530" y="140" width="130" height="120" rx="4" fill="#fff" stroke="#ccc"/>
  <circle cx="595" cy="160" r="10" fill="#2ca02c"/><text x="591" y="164" font-family="sans-serif" font-size: 11px; fill="#fff" font-weight="bold">5</text>
  <text x="595" y="185" class="mod-title" text-anchor="middle">Desordem (Análise)</text>
  <text x="540" y="210" class="mod-text">Mede o nível de</text>
  <text x="540" y="225" class="mod-text">desordem da pilha A</text>

  <path d="M 660 200 L 690 200" class="arrow" marker-end="url(#arrow)"/>

  <!-- Mód 6 (Estratégia) -->
  <rect x="690" y="140" width="130" height="120" rx="4" fill="#fff" stroke="#ccc"/>
  <circle cx="755" cy="160" r="10" fill="#2ca02c"/><text x="751" y="164" font-family="sans-serif" font-size: 11px; fill="#fff" font-weight="bold">6</text>
  <text x="755" y="185" class="mod-title" text-anchor="middle">Escolha Estratégia</text>
  <text x="700" y="210" class="mod-text">Decide melhor</text>
  <text x="700" y="225" class="mod-text">algoritmo baseado em N</text>

  <path d="M 820 200 L 850 200" class="arrow" marker-end="url(#arrow)"/>

  <!-- Mód 8 (Saída) -->
  <rect x="850" y="140" width="100" height="120" rx="4" fill="#fff" stroke="#ccc"/>
  <circle cx="900" cy="160" r="10" fill="#7f7f7f"/><text x="896" y="164" font-family="sans-serif" font-size: 11px; fill="#fff" font-weight="bold">8</text>
  <text x="900" y="185" class="mod-title" text-anchor="middle">Saída</text>
  <text x="860" y="210" class="mod-text">Imprime as</text>
  <text x="860" y="225" class="mod-text">operações</text>

  <!-- Sub-bloco Inferior: Operações de Apoio (Módulos 9, 10, 11) -->
  <rect x="30" y="370" width="940" height="170" rx="8" fill="#fdfaf6" stroke="#ed7d31" stroke-width="2"/>
  <text x="500" y="395" class="section-title" fill="#ed7d31">MÓDULOS DE APOIO E DIAGNÓSTICO</text>

  <!-- Mód 9 Benchmark -->
  <rect x="150" y="420" width="200" height="90" rx="4" fill="#fff" stroke="#ed7d31"/>
  <text x="170" y="445" class="mod-title">9. Benchmark</text>
  <text x="170" y="465" class="mod-text">Mede tempo de execução e</text>
  <text x="170" y="480" class="mod-text">faz contagem total de movimentos.</text>

  <!-- Mód 10 Erros -->
  <rect x="400" y="420" width="200" height="90" rx="4" fill="#fff" stroke="#ed7d31"/>
  <text x="420" y="445" class="mod-title">10. Tratamento de Erros</text>
  <text x="420" y="465" class="mod-text">Libera memória (free), limpa</text>
  <text x="420" y="480" class="mod-text">as pilhas e exibe "Error\n".</text>

  <!-- Mód 11 Desempenho -->
  <rect x="650" y="420" width="200" height="90" rx="4" fill="#fff" stroke="#ed7d31"/>
  <text x="670" y="445" class="mod-title">11. Desempenho</text>
  <text x="670" y="465" class="mod-text">Avalia metas (ex: se passou</text>
  <text x="670" y="480" class="mod-text">dentro do limite de 700 ops).</text>

  <!-- Conexões Tracejadas de Apoio -->
  <path d="M 275 260 L 275 350 L 500 350 L 500 420" class="dash-arrow" marker-end="url(#dash-arrow-head)"/>
  <path d="M 755 260 L 755 350 L 500 350" class="dash-arrow"/>
</svg>
